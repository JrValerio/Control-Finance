name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (web)
        run: npm -w apps/web run lint

      - name: Typecheck (web)
        run: npm run typecheck

      - name: Test (web)
        run: npm -w apps/web run test:run

      - name: Build (web)
        run: npm -w apps/web run build

  api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (api)
        run: npm -w apps/api run lint

      - name: Test (api)
        run: npm -w apps/api run test

      - name: Build (api)
        run: npm -w apps/api run build

  smoke_critical_finance_journey:
    name: smoke-critical-finance-journey
    runs-on: ubuntu-latest
    needs: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Smoke (critical finance journey)
        run: npm -w apps/api run test:smoke:critical | tee smoke-critical-finance-journey.log

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-critical-finance-journey-log
          path: smoke-critical-finance-journey.log

  http_hardening_baseline:
    name: http-hardening-baseline
    runs-on: ubuntu-latest
    needs: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hardening baseline contract
        run: npm -w apps/api run test:hardening:http | tee http-hardening-baseline.log

      - name: Upload hardening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-hardening-baseline-log
          path: http-hardening-baseline.log

  document_financial_observability:
    name: document-financial-observability
    runs-on: ubuntu-latest
    needs: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Observability contract (documents)
        run: npm -w apps/api run test:observability:documents | tee document-financial-observability.log

      - name: Upload observability evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: document-financial-observability-log
          path: document-financial-observability.log

  semantic_contract_enforcement_dashboard:
    name: semantic-contract-enforcement-dashboard
    runs-on: ubuntu-latest
    needs: [api, web]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Semantic contract enforcement (dashboard slice)
        run: |
          set -o pipefail
          {
            npm -w apps/api run test:semantic:dashboard
            npm -w apps/web run test:semantic:dashboard
          } 2>&1 | tee semantic-contract-enforcement-dashboard.log

      - name: Upload semantic enforcement evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-contract-enforcement-dashboard-log
          path: semantic-contract-enforcement-dashboard.log

  hotspot_credit_card_invoices:
    name: hotspot-credit-card-invoices
    runs-on: ubuntu-latest
    needs: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hotspot regression (credit card invoices)
        run: npm -w apps/api run test:hotspot:credit-card-invoices | tee hotspot-credit-card-invoices.log

      - name: Upload hotspot evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hotspot-credit-card-invoices-log
          path: hotspot-credit-card-invoices.log
