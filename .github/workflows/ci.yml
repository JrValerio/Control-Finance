name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Lint (web)
        run: npm -w apps/web run lint

      - name: Typecheck (web)
        run: npm run typecheck

      - name: Test (web)
        run: npm -w apps/web run test:run

      - name: Build (web)
        run: npm -w apps/web run build

  api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Lint (api)
        run: npm -w apps/api run lint

      - name: Typecheck (api)
        run: npm -w apps/api run typecheck

      - name: Test (api)
        run: npm -w apps/api run test

      - name: Build (api)
        run: npm -w apps/api run build

  smoke_critical_finance_journey:
    name: smoke-critical-finance-journey
    runs-on: ubuntu-latest
    needs: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Smoke (critical finance journey)
        run: npm -w apps/api run test:smoke:critical | tee smoke-critical-finance-journey.log

      - name: Upload smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-critical-finance-journey-log
          path: smoke-critical-finance-journey.log

  http_hardening_baseline:
    name: http-hardening-baseline
    runs-on: ubuntu-latest
    needs: [api]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: rm -f package-lock.json && npm install

      - name: Hardening baseline contract
        run: npm -w apps/api run test:hardening:http | tee http-hardening-baseline.log

      - name: Upload hardening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: http-hardening-baseline-log
          path: http-hardening-baseline.log

  document_financial_observability:
    name: document-financial-observability
